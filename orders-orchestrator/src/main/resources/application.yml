spring:
  application:
    name: orders-orchestrator
  profiles:
    active: h2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

app:
  services:
    customer:
      url: ${APP_SERVICES_CUSTOMER_URL:http://localhost:8082}
    restaurant:
      url: ${APP_SERVICES_RESTAURANT_URL:http://localhost:8083}
    driver:
      url: ${APP_SERVICES_DRIVER_URL:http://localhost:8084}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
